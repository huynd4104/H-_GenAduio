                                            <p className="text-xs">Chưa quét thư mục âm thanh.</p>
                                            <p className="text-[10px] mt-1">Hãy nhập đường dẫn và nhấn Quét phía trên.</p>
                                        </div>
                                    ) : audioFiles.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-center text-slate-500 py-10">
                                            <p className="text-xs">Không tìm thấy file âm thanh nào.</p>
                                            <p className="text-[10px] mt-1">Hỗ trợ: wav, mp3, m4a, ogg.</p>
                                        </div>
                                    ) : (
                                        audioFiles.map(file => (
                                            <LibraryItem
                                                key={file.id}
                                                file={file}
                                                onAddToTimeline={handleAddToTimeline}
                                                audioCtx={getAudioContext()}
                                                audioBuffersCache={audioBuffersCache}
                                            />
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Right Side: Timeline & Editor Controls */}
                        <div className="lg:col-span-8 flex flex-col gap-6 min-w-0">

                            {/* Controls and Metadata Info */}
                            <div className="glass-panel p-4 rounded-xl flex flex-wrap items-center justify-between gap-4">
                                <div className="flex items-center gap-3">
                                    {/* Playback Buttons */}
                                    <button
                                        onClick={handleRestart}
                                        className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg border border-slate-700 text-xs transition"
                                        title="Quay lại đầu (0s)"
                                    >
                                        ⏪
                                    </button>
                                    <button
                                        onClick={handlePlayPause}
                                        disabled={clips.length === 0 || isAnyClipLoading}
                                        className={`px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-1.5 ${isPlaying ? 'bg-amber-600 hover:bg-amber-500 text-white' : 'bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white'}`}
                                    >
                                        {isAnyClipLoading ? '⏳ Đang tải...' : isPlaying ? '⏸️ Tạm dừng' : '▶️ Phát thử'}
                                    </button>
                                    <button
                                        onClick={handleStop}
                                        className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg border border-slate-700 text-xs transition"
                                        title="Dừng phát"
                                    >
                                        ⏹️
                                    </button>

                                    {/* Playback time indicator */}
                                    <div className="text-xs font-mono bg-slate-950 px-3 py-2 rounded-lg border border-slate-800 text-slate-300">
                                        <span className="text-indigo-400 font-bold">{playheadTime.toFixed(2)}s</span> / {totalDuration.toFixed(2)}s
                                    </div>
                                </div>

                                <div className="flex items-center gap-2">
                                    {/* Zoom Control */}
                                    <span className="text-xs text-slate-400">Thu phóng:</span>
                                    <input
                                        type="range"
                                        min="2"
                                        max="100"
                                        value={pixelsPerSecond}
                                        onChange={(e) => setPixelsPerSecond(parseInt(e.target.value))}
                                        className="w-20 accent-indigo-500"
                                    />
                                    <span className="text-[10px] font-mono text-slate-500 w-8">{pixelsPerSecond}px/s</span>
                                </div>

                                <div className="flex items-center gap-2">
                                    {/* Project Save/Load */}
                                    <button
                                        onClick={handleLoadProject}
                                        className="px-3 py-1.5 bg-slate-800 border border-slate-700 hover:border-indigo-500 text-xs rounded-lg transition text-slate-300 hover:text-white"
                                    >
                                        📂 Tải Dự án
                                    </button>
                                    <div className="relative flex items-center">
                                        <button
                                            onClick={handleSaveProject}
                                            disabled={clips.length === 0}
                                            className="px-3 py-1.5 bg-slate-800 border border-slate-700 hover:border-indigo-500 disabled:opacity-40 text-xs rounded-lg transition text-slate-300 hover:text-white"
                                        >
                                            💾 Lưu Dự án
                                        </button>
                                        {saveMsg && (
                                            <span className="absolute -bottom-6 left-0 right-0 text-center text-[10px] text-emerald-400 font-mono">
                                                {saveMsg}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Timeline Canvas Container */}
                            <div className="glass-panel rounded-xl overflow-hidden flex flex-col flex-1">
                                <div className="bg-slate-900/90 border-b border-white/5 py-2 px-4 flex items-center justify-between text-xs text-slate-400">
                                    <span className="font-semibold text-slate-300">Dòng thời gian (Timeline)</span>
                                    <span className="text-[10px] text-slate-500">Mẹo: Kéo thả các clip để sắp xếp thứ tự</span>
                                </div>

                                {/* Timeline Ruler and Track scrollable container */}
                                <div
                                    ref={timelineRef}
                                    onDragOver={(e) => e.preventDefault()}
                                    onDrop={handleTimelineDrop}
                                    className="flex-1 overflow-x-auto overflow-y-hidden p-6 relative bg-slate-950/40 select-none min-h-[220px]"
                                >
                                    {/* Scrollable area width */}
                                    <div
                                        style={{ width: `${Math.max(400, totalDuration * pixelsPerSecond + 100)}px` }}
                                        className="relative h-full flex flex-col justify-start"
                                    >
                                        {/* Ruler Header (Ticks) */}
                                        <div
                                            ref={rulerRef}
                                            onMouseDown={handleRulerMouseDown}
                                            className="h-6 w-full border-b border-slate-800/80 relative cursor-pointer mb-4"
                                        >
                                            {Array.from({ length: Math.ceil(totalDuration) + 10 }).map((_, idx) => (
                                                <div
                                                    key={idx}
                                                    className="absolute bottom-0 border-l border-slate-700/60 font-mono text-[9px] text-slate-500 pl-1"
                                                    style={{ left: `${idx * pixelsPerSecond}px`, height: idx % 5 === 0 ? '12px' : '6px' }}
                                                >
                                                    {idx % 5 === 0 ? `${idx}s` : ''}
                                                </div>
                                            ))}
                                        </div>

                                        {/* Audio Track Block */}
                                        <div id="timeline-track" className="relative h-32 w-full bg-slate-900/10 border border-dashed border-slate-800/60 rounded-lg overflow-hidden">
                                            {clips.length === 0 ? (
                                                <div className="absolute inset-0 flex items-center justify-center text-slate-500 text-xs">
                                                    Kéo thả file âm thanh từ Thư viện vào đây để bắt đầu ghép
                                                </div>
                                            ) : (
                                                clips.map((clip, index) => (
                                                    <AudioClip
                                                        key={clip.id}
                                                        clip={clip}
                                                        index={index}
                                                        onUpdate={handleUpdateClip}
                                                        onDelete={handleDeleteClip}
                                                        pixelsPerSecond={pixelsPerSecond}
                                                        isLoaded={loadedIds.has(clip.audioId)}
                                                        timelineRef={timelineRef}
                                                        clips={clips}
                                                        playheadTimeRef={playheadTimeRef}
                                                    />
                                                ))
                                            )}
                                        </div>

                                        {/* Draggable Playhead Cursor */}
                                        <div
                                            id="timeline-playhead-line"
                                            className={`absolute top-0 bottom-0 w-[2px] z-20 pointer-events-none transition-colors duration-75 ${isAligned ? 'bg-emerald-500 accent-glow-green' : 'bg-red-500 accent-glow'}`}
                                            style={{ left: `${playheadTime * pixelsPerSecond}px` }}
                                        >
                                            <div
                                                id="timeline-playhead-handle"
                                                onMouseDown={handleRulerMouseDown}
                                                className={`w-3 h-3 rounded-full -ml-[5px] -mt-1 shadow-md cursor-ew-resize pointer-events-auto transition-colors duration-75 ${isAligned ? 'bg-emerald-500' : 'bg-red-500'}`}
                                                title="Kéo để di chuyển thanh thời gian"
                                            ></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Export Modal / Actions */}
                            <div className="glass-panel p-4 rounded-xl flex items-center justify-between gap-4">
                                <div className="text-xs text-slate-400">
                                    <p>📌 Xuất ra các file:</p>
                                    <p className="font-mono text-slate-200 mt-0.5">final_audio.wav, final_audio.mp3</p>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={handleOpenTempDir}
                                        className="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-semibold rounded-lg text-xs transition duration-200 border border-slate-700 flex items-center gap-1.5"
                                        title="Mở thư mục lưu tạm trong Finder"
                                    >
                                        📂 Mở thư mục tạm
                                    </button>
                                    <button
                                        onClick={handleExport}
                                        disabled={isExporting || clips.length === 0}
                                        className="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-lg text-xs transition duration-200 disabled:opacity-50 flex items-center gap-2 shadow-lg"
                                    >
                                        {isExporting ? (
                                            <>
                                                <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                                Đang xử lý ghép bằng FFmpeg...
                                            </>
                                        ) : '🚀 Tạo file âm thanh hoàn chỉnh'}
                                    </button>
                                </div>
                            </div>

                            {/* Export Results Display */}
                            {exportResult && exportResult.wav_url && (
                                <div className="glass-panel p-4 rounded-xl border-indigo-500/30 flex flex-col gap-3 animate-fadeIn">
                                    <h4 className="text-sm font-semibold text-emerald-400 flex items-center gap-1.5">
                                        🎉 Xuất âm thanh thành công!
                                    </h4>
                                    <p className="text-xs text-slate-400">
                                        Đã ghép nhạc thành công. Bạn có thể nghe thử hoặc tải về máy của bạn:
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                        <div className="p-3 bg-slate-950/60 rounded-lg border border-slate-800 flex flex-col gap-2">
                                            <span className="text-xs font-semibold text-slate-300">🎵 Định dạng WAV (Chất lượng cao)</span>
                                            <audio controls src={exportResult.wav_url} className="w-full h-8 mt-1" />
                                            <a
                                                href={exportResult.wav_url}
                                                download={`${downloadFilenameBase}.wav`}
                                                className="text-center py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded border border-slate-700 text-xs transition font-semibold"
                                            >
                                                💾 Tải xuống WAV
                                            </a>
                                        </div>
                                        <div className="p-3 bg-slate-950/60 rounded-lg border border-slate-800 flex flex-col gap-2">
                                            <span className="text-xs font-semibold text-slate-300">🎵 Định dạng MP3 (Dung lượng nhẹ)</span>
                                            <audio controls src={exportResult.mp3_url} className="w-full h-8 mt-1" />
                                            <a
                                                href={exportResult.mp3_url}
                                                download={`${downloadFilenameBase}.mp3`}
                                                className="text-center py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded border border-slate-700 text-xs transition font-semibold"
                                            >
                                                💾 Tải xuống MP3
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* Load Project Modal Removed */}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
